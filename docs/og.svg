<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4EFE3"/>
      <stop offset="55%" stop-color="#EFE7D6"/>
      <stop offset="100%" stop-color="#E7DCC4"/>
    </linearGradient>
    <linearGradient id="ever" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E4034"/>
      <stop offset="100%" stop-color="#1F2E25"/>
    </linearGradient>
    <radialGradient id="amberglow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#D99A3A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#D99A3A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="none" stroke="#C9B98F" stroke-width="2"/>

  <!-- Left: signature seasonal strata ring -->
  <g transform="translate(322 315)">
    <circle r="232" fill="url(#amberglow)"/>
    <!-- sediment / season strata rings -->
    <circle r="206" fill="none" stroke="#C9B98F" stroke-width="1.5" opacity="0.55"/>
    <circle r="176" fill="none" stroke="#7E6A3E" stroke-width="10" opacity="0.20"/>
    <circle r="150" fill="none" stroke="#5B7256" stroke-width="14" opacity="0.30"/>
    <circle r="121" fill="none" stroke="#3C5142" stroke-width="16" opacity="0.45"/>
    <circle r="92"  fill="none" stroke="#2E4034" stroke-width="18" opacity="0.65"/>
    <!-- amber arc = this season's update -->
    <path d="M 0 -206 A 206 206 0 0 1 178 104" fill="none" stroke="#D99A3A" stroke-width="9" stroke-linecap="round"/>
    <circle cx="0" cy="-206" r="9" fill="#D99A3A"/>
    <!-- evergreen core -->
    <circle r="64" fill="url(#ever)"/>
    <path d="M 0 -34 L 17 6 L 0 -6 L -17 6 Z M 0 -10 L 13 22 L 0 12 L -13 22 Z" fill="#CFE0C9" opacity="0.92"/>
    <rect x="-2.5" y="20" width="5" height="20" rx="2" fill="#CFE0C9" opacity="0.92"/>
  </g>

  <!-- Right: text -->
  <g transform="translate(648 0)">
    <text x="0" y="196" font-size="22" letter-spacing="6" fill="#7E6A3E" font-family="Inter, system-ui, sans-serif" font-weight="600">A LITERATURE REVIEW THAT NEVER GOES STALE</text>
    <text x="0" y="288" font-size="104" fill="#22321A" font-style="italic" font-weight="500">Perennial</text>
    <text x="0" y="368" font-size="33" fill="#3A4A3E" font-family="Inter, system-ui, sans-serif">Subscribe to a research question.</text>
    <text x="0" y="412" font-size="33" fill="#3A4A3E" font-family="Inter, system-ui, sans-serif">Get a versioned, citation-verified</text>
    <text x="0" y="456" font-size="33" fill="#3A4A3E" font-family="Inter, system-ui, sans-serif">survey that updates itself every week.</text>
    <g transform="translate(0 506)">
      <rect x="0" y="0" width="232" height="46" rx="23" fill="#2E4034"/>
      <text x="116" y="30" font-size="19" fill="#F4EFE3" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="600">Every reference verified</text>
    </g>
  </g>
</svg>
