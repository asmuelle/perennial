services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: perennial
      POSTGRES_PASSWORD: perennial
      POSTGRES_DB: perennial_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U perennial']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
